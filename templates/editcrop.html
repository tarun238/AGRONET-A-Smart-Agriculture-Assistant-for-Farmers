                        <center><h3>Edit Crops</h3></center>
                        <hr>
                        <br>
                        <form id="labnol" method="post" action="/edit_crop" enctype="multipart/form-data">
                                <label for="">Id:</label>
                                <input name="Id" value="{{result[0]}}" readonly class="form-control" type="number">

                                <label for="">Crop:</label>
                                <input name="crop" value="{{result[1]}}" placeholder="Enter crop name" class="form-control" type="text" required>

                                <label for="">Price: </label>

                            <input type="number" name="qnt" value="{{result[5]}}" placeholder="enter quantity" class="form-control" id="">

                           <label for="">District:</label>

                            <option value=Haveri>Haveri</option>
                            <option value=Kodagu>Kodagu</option>
                            <option value=Kolar>Kolar</option>
                            <option value=Koppal>Koppal</option>
                            <option value=Mandya>Mandya</option>
                            <option value=Mysore>Mysore</option>
                            <option value=Raichur>Raichur</option>
                            <option value=Ramanagara>Ramanagara</option>
                            <option value=Shimoga>Shimoga</option>

                           <label for="">crop image:</label>

                        <br>
                       <center> <input type="submit" class="form-control btn btn-success"  value="Submit"></center>
