<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Market | AGRONET</title>

    <!-- Font Awesome -->
    <script
      src="https://use.fontawesome.com/releases/v5.15.3/js/all.js"
      crossorigin="anonymous"
    ></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700"
      rel="stylesheet"
    />

    <!-- Core Theme CSS -->
    <link href="http://127.0.0.1:5000/static/css/styles.css" rel="stylesheet" />

    <style>
      .row {
        margin-top: 200px;
      }

      body {
        background-image: url("https://images.stockcake.com/public/3/4/5/34544110-e8f4-4bce-8e9b-a21de3dff9d8/vintage-paper-texture-stockcake.jpg");
      }

      table {
        background-color: rgba(255, 255, 255, 0.781);;
      }

      thead {
        background-color: #2c3e50;
        color: white;
      }
    </style>
  </head>

  <body id="page-top">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
      <div class="container">
        <a class="navbar-brand h1" href="/crop">AGRONET</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarResponsive"
        >
          Menu <i class="fas fa-bars ms-1"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarResponsive">
          <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
            <li class="nav-item"><a class="nav-link" href="/buyer">Crops</a></li>
            <li class="nav-item"><a class="nav-link" href="/tools">Tools</a></li>
            <li class="nav-item"><a class="nav-link" href="/weather">Weather</a></li>
            <li class="nav-item"><a class="nav-link" href="/market">Market</a></li>
            <li class="nav-item"><a class="nav-link" href="/community">Community</a></li>
            <li class="nav-item"><a class="nav-link" href="/agrichat">AgroChat</a></li>
            <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <img
                  src="data:image/jpg;base64,{{dp}}"
                  style="width: 40px; height: 40px; border-radius: 50%"
                /><br />
                {{name}}
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- MARKET TABLE -->
    <div class="container">
      <div class="row">
        <div class="col-lg-12">

          <table class="table table-bordered table-striped table-hover">
            <thead>
              <tr>
                <th>S.No</th>
                <th>Commodity</th>
                <th>City</th>
                <th>Variety</th>
                <th>Maximum Price</th>
                <th>Average Price</th>
                <th>Minimum Price</th>
                <th>Last Updated On</th>
              </tr>
            </thead>

            <tbody>
              {% for row in result %}
              <tr>
                <td>{{ loop.index }}</td>
                {% for col in row %}
                  <td>{{ col }}</td>
                {% endfor %}
              </tr>
              {% endfor %}
            </tbody>
          </table>

        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="http://127.0.0.1:5000/static/js/scripts.js"></script>
  </body>
</html>
