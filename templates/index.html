<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title></title>
        <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.css"></link> -->
        <!-- Favicon-->
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v5.15.3/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="http://127.0.0.1:5000/static/css/styles.css" rel="stylesheet" />
        <style>
          #form1, #form2, #form3, #form4{
                display: none;
                width: 40%;
                text-align: left;
                border-radius: 2rem;
                margin: auto;
                /* border: 1px solid #ddd; */
                padding: 25px;
                background-color: rgba(0, 0, 0, 0.70);
                box-shadow: 0px 8px 16px 4px #000000;
               

            }
            #form1.active, #form2.active, #form3.active, #form4.active{
                    display: block;
            }
            body{
               background-image: url("https://images.stockcake.com/public/6/5/9/659eac99-5c66-489a-9b17-c55f79d86663/nature-frame-design-stockcake.jpg");
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: 100% 100vh;
            }
        </style>
    </head>
    <body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
            <div class="container">
                <!-- <li class="nav-item"><a class="nav-link" href="#page-top">AUTISM</a></li> -->
                <a class="navbar-brand h1" href="/"> AGRONET</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="fas fa-bars ms-1"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                        <li><a data-value="#form1" onclick="toggleform(event)" class="nav-link">Customer</a></li>
                        <li><a data-value="#form3" onclick="toggleform(event)" class="nav-link">Farmer</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        
        <!-- Masthead-->
        <header class="masthead">
            <div class="container">
              {% if msg %}
                <div class="container">
                    <div class="container">
                      <div class="alert alert-success alert-dismissible">
                        <a href="#" class="close" data-dismiss="alert" aria-label="close">&times;</a>
                        <strong>{{msg}}</strong> 
                      </div>
                    </div>
                {% endif %}
                <form  method="post" action="{{ url_for('userlog')}}" id="form1" class="active">
                    <h2>Customer Login</h2>
                    <hr>
                    <div class="form-group">
                      <label for="username">Username:</label>
                      <input type="text" class="form-control" id="username" placeholder="Enter username" name="name" required>
                    </div><br>
                    <div class="form-group">
                      <label for="password">Password:</label>
                      <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                      title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" class="form-control" id="password" placeholder="Enter password" name="password" required>
                    </div><br>
                    <button type="submit" class="btn btn-success">Submit</button></br></br>
                    Don't have account <a data-value="#form2" onclick="toggleform(event)" class="nav-link"> regester here</a>
                  </form>
              
                  
                  <form method="post" action="{{ url_for('userreg')}}" id="form2" enctype="multipart/form-data">
                    <h2>Customer Regestration</h2>
                    <hr>
                    <div class="form-group">
                      <label for="username">Username:</label>
                      <input type="text" class="form-control" id="username" placeholder="Enter username" name="name" required>
                    </div><br>
                    <div class="form-group">
                      <label for="email">Email:</label>
                      <input type="email" class="form-control" id="email" placeholder="Enter email" name="email" required>
                    </div><br>
                    <div class="form-group">
                      <label for="phone">Mobile No.:</label>
                      <input type="text" class="form-control" id="phone" placeholder="Enter mobile number" name="phone" pattern="[6-9]{1}[0-9]{9}" 
                      title="Phone number with 6-9 and remaing 9 digit with 0-9" required>
                    </div><br>
                    <div class="form-group">
                      <label for="password">Password:</label>
                      <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                      title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" class="form-control" id="password" placeholder="Enter password" name="password" required>
                    </div><br>
                    <div class="form-group">
                      <label for="porfile">Profile:</label>
                      <input type="file" class="form-control" id="porfile" name="file" required>
                    </div><br>
                    <button type="submit" class="btn btn-success">Submit</button></br></br>
                    Already have account <a data-value="#form1" onclick="toggleform(event)" class="nav-link">here</a>
                  </form>

                  <form  method="post" action="{{ url_for('farmerlog')}}" id="form3">
                    <h2>Farmer Login</h2>
                    <hr>
                    <div class="form-group">
                      <label for="username">Username:</label>
                      <input type="text" class="form-control" id="username" placeholder="Enter username" name="name" required>
                    </div><br>
                    <div class="form-group">
                      <label for="password">Password:</label>
                      <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                      title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" class="form-control" id="password" placeholder="Enter password" name="password" required>
                    </div><br>
                    <button type="submit" class="btn btn-success">Submit</button></br></br>
                    Don't have account <a data-value="#form4" onclick="toggleform(event)" class="nav-link">Regester here</a>
                  </form>
              
                  
                  <form method="post" action="{{ url_for('farmerreg')}}" id="form4" enctype="multipart/form-data">
                    <h2>Farmer Regestration</h2>
                    <hr>
                    <div class="form-group">
                      <label for="username">Username:</label>
                      <input type="text" class="form-control" id="username" placeholder="Enter username" name="name" required>
                    </div><br>
                    <div class="form-group">
                      <label for="email">Email:</label>
                      <input type="email" class="form-control" id="email" placeholder="Enter email" name="email" required>
                    </div><br>
                    <div class="form-group">
                      <label for="phone">Mobile No.:</label>
                      <input type="text" class="form-control" id="phone" placeholder="Enter mobile number" name="phone" pattern="[7-9]{1}[0-9]{9}" 
                      title="Phone number with 7-9 and remaing 9 digit with 0-9" required>
                    </div><br>
                    <div class="form-group">
                      <label for="password">Password:</label>
                      <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                      title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" class="form-control" id="password" placeholder="Enter password" name="password" required>
                    </div><br>
                    <div class="form-group">
                      <label for="porfile">Profile:</label>
                      <input type="file" class="form-control" id="porfile" name="file" required>
                    </div><br>
                    <button type="submit" class="btn btn-success">Submit</button></br></br>
                    Already have account sign in <a data-value="#form3" onclick="toggleform(event)" class="nav-link">here</a>
                  </form>
            </div>
            
        </header>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.0.3/css/font-awesome.css"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="http://127.0.0.1:5000/static/js/scripts.js"></script>
        <script>
            function toggleform(e) {
            var Id =(e.target.getAttribute('data-value'))
            let Items= ['#form1', '#form2', '#form3', '#form4'];
            Items.map(function(item) {
                if(Id === item ) {
                    $(item).addClass("active");
                }
                else {
                $(item).removeClass("active");
                }
            })
        }
        
        </script>
    </body>
</html>
